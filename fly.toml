app = "<your-postgres-app>"
primary_region = "gru"

[build]

[env]
  PGDATA = "/var/lib/postgresql/data/pgdata"
  POSTGRES_DB = "gdi"
  TZ = "America/Argentina/Buenos_Aires"

[mounts]
  source = "pg_data"
  destination = "/var/lib/postgresql/data"

[[services]]
  internal_port = 5432
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
